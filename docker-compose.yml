services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  customerservice:
    container_name: customerservice
    build:
      context: ./CustomerService/CustomerService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ./CustomerService/CustomerService.Api/Data:/app/Data

  productservice:
    container_name: productservice
    build:
      context: ./ProductService/ProductService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    volumes:
      - ./ProductService/ProductService.Api/Data:/app/Data

  orderservice:
    container_name: orderservice
    build:
      context: ./OrderService/OrderService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CustomerServiceUrl: http://customerservice:8080
      ProductServiceUrl: http://productservice:8080
    depends_on:
      - customerservice
      - productservice
      - rabbitmq   # ✅ 关键！
    volumes:
      - ./OrderService/OrderService.Api/Data:/app/Data

  paymentservice:
    container_name: paymentservice
    build:
      context: ./PaymentService/PaymentService.Api
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      OrderServiceUrl: http://orderservice:8080
    depends_on:
      - orderservice
    volumes:
      - ./PaymentService/PaymentService.Api/Data:/app/Data

  apigateway:
    container_name: apigateway
    build:
      context: ./ApiGateway
      dockerfile: Dockerfile
    ports:
      - "7001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ServiceUrls__CustomerService: http://customerservice:8080
      ServiceUrls__ProductService: http://productservice:8080
      ServiceUrls__OrderService: http://orderservice:8080
      ServiceUrls__PaymentService: http://paymentservice:8080
    depends_on:
      - customerservice
      - productservice
      - orderservice
      - paymentservice
      
